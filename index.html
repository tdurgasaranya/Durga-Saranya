<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Durga Saranya Tummalapalli - Lead Data Analytics Engineer</title>

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background: #f3f4f6;
            color: #1f2937;
            line-height: 1.6;
        }

        .container {
            max-width: 70rem;
            margin: 0 auto;
            padding: 0 2.5rem;
        }

        /* HERO */
        .hero {
            padding: 5rem 0;
            position: relative;
            overflow: hidden;
        }

        .hero-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 3rem;
            align-items: center;
        }

        @media (min-width: 1024px) {
            .hero-content {
                grid-template-columns: repeat(12, 1fr);
            }
        }

        .hero-text {
            grid-column: span 12;
            text-align: center;
        }

        @media (min-width: 1024px) {
            .hero-text {
                grid-column: span 6;
                text-align: left;
            }
        }

        .hero-image-wrapper {
            grid-column: span 12;
            display: flex;
            justify-content: center;
        }

        @media (min-width: 1024px) {
            .hero-image-wrapper {
                grid-column: span 6;
                justify-content: flex-end;
            }
        }

        .hero-image {
            width: 20rem;
            height: 20rem;
            border-radius: 1rem;
            object-fit: cover;
            border: 3px solid #B265FF;
            background: #ffffff;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        @media (min-width: 1024px) {
            h1 {
                font-size: 3rem;
            }
        }

        .gradient-text {
            background: linear-gradient(to right, #B265FF, #FF4400, #FFA100);
            -webkit-background-clip: text;
            color: transparent;
        }

        .subtitle {
            color: #4b5563;
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }

        .description {
            color: #4b5563;
            max-width: 42rem;
            margin-bottom: 2rem;
        }

        .cta-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        @media (min-width: 1024px) {
            .cta-buttons {
                justify-content: flex-start;
            }
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            transition: 0.3s;
        }

        .btn-primary {
            background: linear-gradient(to right, #B265FF, #FF4400, #FFA100);
            color: #ffffff;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-secondary {
            color: #B265FF;
            border: 2px solid #B265FF;
            background: transparent;
        }

        .btn-secondary:hover {
            background: #f3e8ff;
        }

        section {
            padding: 5rem 0;
        }

        .section-title {
            text-align: center;
            font-size: 1.75rem;
            margin-bottom: 3rem;
        }

        /* CARDS */
        .skill-card,
        .experience-card,
        .stat-card,
        .education-card,
        .contact-link {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 1rem;
        }

        .skill-card {
            padding: 1.5rem;
        }

        .skill-card h3 {
            color: #B265FF;
            margin-bottom: 0.5rem;
        }

        .skill-card p {
            color: #4b5563;
        }

        .skills-grid {
            display: grid;
            gap: 1.5rem;
        }

        @media (min-width: 1024px) {
            .skills-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* EXPERIENCE */
        .experience-grid {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .experience-card {
            padding: 2rem;
            border-left: 4px solid #B265FF;
        }

        .experience-card h3 {
            color: #111827;
        }

        .company {
            color: #B265FF;
            font-weight: 600;
        }

        .date {
            color: #6b7280;
            font-size: 0.9rem;
        }

        .experience-card ul {
            margin-top: 1rem;
            list-style: none;
        }

        .experience-card li {
            padding-left: 1.5rem;
            margin-bottom: 0.5rem;
            position: relative;
            color: #4b5563;
        }

        .experience-card li::before {
            content: "▹";
            position: absolute;
            left: 0;
            color: #FFA100;
        }

        /* STATS */
        .stats-grid {
            display: grid;
            gap: 1.5rem;
        }

        @media (min-width: 1024px) {
            .stats-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .stat-card {
            padding: 1.5rem;
            text-align: center;
        }

        .stat-number {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(to right, #B265FF, #FFA100);
            -webkit-background-clip: text;
            color: transparent;
        }

        .stat-label {
            color: #6b7280;
            margin-top: 0.5rem;
        }

        /* PROJECTS */
        .projects-grid {
            display: grid;
            gap: 1.5rem;
        }

        @media (min-width: 1024px) {
            .projects-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .project-card {
            padding: 2rem;
            border-radius: 1rem;
            background: linear-gradient(135deg, #B265FF, #FF4400);
            color: #ffffff;
        }

        .project-link {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.5rem 1.25rem;
            border: 2px solid #ffffff;
            border-radius: 0.5rem;
            text-decoration: none;
            color: #ffffff;
        }

        /* CONTACT */
        .contact-links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .contact-link {
            padding: 0.75rem 1.5rem;
            color: #1f2937;
            text-decoration: none;
        }

        .contact-link:hover {
            background: #f3e8ff;
            border-color: #B265FF;
        }

        /* FOOTER */
        footer {
            background: #e5e7eb;
            padding: 2rem 0;
            text-align: center;
            color: #374151;
        }
    </style>
</head>

<body>

<!-- HERO -->
<section class="hero">
    <div class="container">
        <div class="hero-content">

            <div class="hero-text">
                <h1>Hi, I'm <span class="gradient-text">Durga Saranya</span></h1>
                <p class="subtitle">Lead Data Analytics Engineer</p>
                <p class="description">
                    Data analytics professional with 7+ years of experience in Business Intelligence,
                    specializing in Power BI, SQL, Python, and ETL pipelines.
                </p>

                <div class="cta-buttons">
                    <a href="mailto:durgasaranyatumma@gmail.com" class="btn btn-primary">Get In Touch</a>
                    <a href="https://tdurgasaranya.github.io/Durga-Saranya/" target="_blank" class="btn btn-secondary">View Portfolio</a>
                </div>
            </div>

            <div class="hero-image-wrapper">
                <img
                    src="https://drive.google.com/uc?export=view&id=FILE_ID_HERE"
                    alt="Durga Saranya"
                    class="hero-image"
                >
            </div>

        </div>
    </div>
</section>

<footer>
    <div class="container">
        <p>© 2024 Durga Saranya Tummalapalli | Lead Data Analytics Engineer</p>
    </div>
</footer>

</body>
</html>
